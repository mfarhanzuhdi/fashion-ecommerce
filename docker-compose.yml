version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: fashion-ecommerce-db
    environment:
      POSTGRES_DB: fashion_ecommerce_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fashion-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fashion-ecommerce-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/fashion_ecommerce_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JAVA_TOOL_OPTIONS: "-XX:+UseG1GC -XX:MaxRAMPercentage=75.0"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fashion-network
    volumes:
      - ./backend:/app/backend
      - ~/.m2:/root/.m2:cached

  # Nuxt 3 Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fashion-ecommerce-frontend
    environment:
      NUXT_PUBLIC_API_BASE: http://backend:8080
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - fashion-network
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules

networks:
  fashion-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local